{{- $destination := .Destination -}}
{{- $localDestination := strings.TrimPrefix "/" $destination -}}
{{- $isRemote := or (strings.HasPrefix $destination "http://") (strings.HasPrefix $destination "https://") -}}
{{- $isData := strings.HasPrefix $destination "data:" -}}
<img src="{{ if or $isRemote $isData }}{{ $destination | safeURL }}{{ else }}{{ $localDestination | relURL }}{{ end }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }}>
